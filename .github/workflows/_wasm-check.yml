name: WASM Check

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label as a JSON array string, e.g. ''["ubuntu-latest"]'' or ''["self-hosted"]'''
        required: true
        type: string
      timeout:
        description: 'Job timeout in minutes'
        required: false
        type: number
        default: 30

env:
  CARGO_TERM_COLOR: always

jobs:
  wasm:
    name: WASM Check
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: ${{ inputs.timeout }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.name }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.name }}-cargo-wasm-

      - name: Check WASM build
        run: cargo check --target wasm32-unknown-unknown --features wasm --no-default-features
