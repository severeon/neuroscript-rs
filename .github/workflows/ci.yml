name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Test: GitHub-hosted (always runs) ──────────────────────────────────
  test:
    uses: ./.github/workflows/_build-and-test.yml
    with:
      runner: '["ubuntu-latest"]'
      timeout: 30

  # ── Test: self-hosted (push only — never runs untrusted fork code) ─────
  test-self-hosted:
    if: github.event_name == 'push'
    uses: ./.github/workflows/_build-and-test.yml
    with:
      runner: '["self-hosted"]'
      timeout: 10

  # ── WASM: GitHub-hosted (always runs) ──────────────────────────────────
  wasm:
    uses: ./.github/workflows/_wasm-check.yml
    with:
      runner: '["ubuntu-latest"]'
      timeout: 30

  # ── WASM: self-hosted (push only) ─────────────────────────────────────
  wasm-self-hosted:
    if: github.event_name == 'push'
    uses: ./.github/workflows/_wasm-check.yml
    with:
      runner: '["self-hosted"]'
      timeout: 10

  # ── Gate: single required status check for branch protection ───────────
  ci-status:
    name: CI Status
    needs: [test, test-self-hosted, wasm, wasm-self-hosted]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if tests did not pass
        if: needs.test.result != 'success'
        run: |
          echo "Tests failed: ${{ needs.test.result }}"
          exit 1

      - name: Fail if WASM check did not pass
        if: needs.wasm.result != 'success'
        run: |
          echo "WASM check failed: ${{ needs.wasm.result }}"
          exit 1

      - name: All checks passed
        run: echo "CI passed"
