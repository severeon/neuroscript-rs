name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Test: GitHub-hosted (always runs) ──────────────────────────────────
  test:
    uses: ./.github/workflows/_build-and-test.yml
    with:
      runner: '["ubuntu-latest"]'
      timeout: 30

  # ── Test: self-hosted (push only — never runs untrusted fork code) ─────
  test-self-hosted:
    if: github.event_name == 'push'
    uses: ./.github/workflows/_build-and-test.yml
    with:
      runner: '["self-hosted", "linux"]'
      timeout: 10

  # ── WASM: GitHub-hosted (always runs) ──────────────────────────────────
  wasm:
    uses: ./.github/workflows/_wasm-check.yml
    with:
      runner: '["ubuntu-latest"]'
      timeout: 30

  # ── WASM: self-hosted (push only) ─────────────────────────────────────
  wasm-self-hosted:
    if: github.event_name == 'push'
    uses: ./.github/workflows/_wasm-check.yml
    with:
      runner: '["self-hosted", "linux"]'
      timeout: 10

  # ── Gate: single required status check for branch protection ───────────
  # At least one runner from each pair (test, wasm) must succeed.
  # On pull_request, self-hosted jobs are skipped so only GitHub-hosted is checked.
  # On push, either runner passing is sufficient.
  ci-status:
    name: CI Status
    needs: [test, test-self-hosted, wasm, wasm-self-hosted]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if no test runner succeeded
        if: needs.test.result != 'success' && needs.test-self-hosted.result != 'success'
        run: |
          echo "Both test runners failed (github-hosted: ${{ needs.test.result }}, self-hosted: ${{ needs.test-self-hosted.result }})"
          exit 1

      - name: Fail if no WASM runner succeeded
        if: needs.wasm.result != 'success' && needs.wasm-self-hosted.result != 'success'
        run: |
          echo "Both WASM runners failed (github-hosted: ${{ needs.wasm.result }}, self-hosted: ${{ needs.wasm-self-hosted.result }})"
          exit 1

      - name: All checks passed
        run: echo "CI passed"
