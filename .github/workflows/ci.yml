name: CI

on:
  push:
    branches: [main, _dev]
  pull_request:
    branches: [main, _dev]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    # Use self-hosted for pushes and same-repo PRs; never run untrusted fork code on self-hosted
    runs-on: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.name }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.name }}-cargo-test-
      - run: cargo build --verbose
      - run: cargo test --verbose
      - name: Notify CI complete
        if: always() && github.event_name == 'pull_request'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          REPO="${{ github.repository }}"
          curl -s \
            -H "Title: CI ${STATUS}: PR #${PR_NUM}" \
            -H "Tags: ${STATUS},ci" \
            -H "Click: https://github.com/${REPO}/pull/${PR_NUM}" \
            -d "${PR_TITLE}" \
            "https://ntfy.sh/${NTFY_TOPIC}" || true

  wasm:
    name: WASM Check
    # Use self-hosted for pushes and same-repo PRs; never run untrusted fork code on self-hosted
    runs-on: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.name }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.name }}-cargo-wasm-
      - run: cargo check --target wasm32-unknown-unknown --features wasm --no-default-features
