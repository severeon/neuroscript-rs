[package]
name = "neuroscript"
version = "0.1.0"
edition = "2021"
description = "Neural architecture composition language"

[dependencies]
thiserror = "1.0"      # Clean error types
miette = { version = "7", features = ["fancy"] }  # Beautiful error reporting
num-bigint = "0.4"     # Arbitrary precision integers for shape algebra
num-integer = "0.1"    # Integer traits (gcd, lcm)
num-traits = "0.2"     # Numeric traits (Zero, One)

[dev-dependencies]
pretty_assertions = "1.4"
insta = { version = "1.34", features = ["yaml"] }  # Snapshot testing
