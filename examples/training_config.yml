# Example NeuroScript Training Configuration
# Convention over configuration - only specify what differs from defaults

model:
  neuron: GPT2Small  # Which neuron to train
  file: examples/transformer_from_stdlib.ns
  params:
    vocab_size: 50257  # GPT-2 vocabulary

data:
  train: data/train.jsonl
  val: data/val.jsonl

  # Auto-detected from file extension and model signature
  # format: jsonl
  # task: language_modeling

  # Optional preprocessing
  max_seq_length: 128
  tokenizer: gpt2  # Use HuggingFace tokenizer

training:
  # Basics
  batch_size: 32
  epochs: 10

  # Optimizer (smart defaults for transformers)
  optimizer: adamw
  lr: 3e-4
  weight_decay: 0.01
  warmup_steps: 1000

  # Advanced
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  mixed_precision: true  # Use AMP for speed

  # Checkpointing
  checkpoint_dir: ./checkpoints/gpt2
  save_every: 1000
  keep_last_n: 3  # Only keep 3 most recent checkpoints

  # Logging
  log_every: 100
  eval_every: 1000
  use_wandb: false  # Optional W&B integration

  # Device
  device: cuda  # auto-detected if not specified

# Optional: Override loss and metrics
# (usually inferred from task)
# loss: cross_entropy
# metrics:
#   - perplexity
#   - accuracy

# Optional: Model instrumentation
# hooks:
#   - type: log_activations
#     neurons: [TransformerBlock]
#   - type: gradient_checkpointing
#     neurons: [TransformerBlock]
