# XOR Training Configuration - MVP Test Case

model:
  neuron: XOR
  file: examples/01-xor.ns
  params: {}  # No parameters needed

data:
  train: examples/data/xor_train.jsonl
  val: examples/data/xor_train.jsonl  # Same as train for this toy example
  format: jsonl

training:
  # XOR training
  batch_size: 4
  epochs: 1000

  # Optimizer
  optimizer: adam
  lr: 0.01

  # Loss (inferred from task, but can override)
  loss: bce  # Binary Cross Entropy for XOR

  # Logging
  log_every: 100
  eval_every: 500

  # Checkpointing
  checkpoint_dir: ./checkpoints/xor
  save_every: 500

  device: cpu  # CPU is fine for XOR
