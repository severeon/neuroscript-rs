<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroScript Neuron Genealogy</title>
<style>
/* ============================================================
   CSS Custom Properties
   ============================================================ */
:root {
  --bg: #0d1117;
  --bg-surface: #161b22;
  --bg-card: #1c2128;
  --bg-hover: #252c35;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --text-dim: #6e7681;

  /* Level colors */
  --level-0: #58a6ff;
  --level-1: #a371f7;
  --level-2: #f778ba;
  --level-3: #f0883e;
  --level-4: #d29922;
  --level-5: #7ee787;

  /* Status colors */
  --implemented: #3fb950;
  --planned: #d29922;

  /* Graph */
  --edge-dep: #58a6ff;
  --edge-depby: #f778ba;
  --node-selected: #f0883e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* ============================================================
   Top Controls Bar
   ============================================================ */
.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.controls .logo {
  font-weight: 700;
  font-size: 15px;
  white-space: nowrap;
  color: var(--text);
  margin-right: 4px;
}

.controls .logo span { color: var(--text-muted); font-weight: 400; font-size: 12px; }

.search-box {
  flex: 1;
  min-width: 180px;
  max-width: 340px;
  padding: 6px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.search-box:focus { border-color: var(--level-0); }
.search-box::placeholder { color: var(--text-dim); }

/* Level pills */
.level-pills {
  display: flex;
  gap: 4px;
}
.level-pill {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  opacity: 0.45;
  transition: opacity 0.15s, border-color 0.15s;
  user-select: none;
}
.level-pill.active { opacity: 1; border-color: currentColor; }
.level-pill[data-level="0"] { color: var(--level-0); background: rgba(88,166,255,0.12); }
.level-pill[data-level="1"] { color: var(--level-1); background: rgba(163,113,247,0.12); }
.level-pill[data-level="2"] { color: var(--level-2); background: rgba(247,120,186,0.12); }
.level-pill[data-level="3"] { color: var(--level-3); background: rgba(240,136,62,0.12); }
.level-pill[data-level="4"] { color: var(--level-4); background: rgba(210,153,34,0.12); }
.level-pill[data-level="5"] { color: var(--level-5); background: rgba(126,231,135,0.12); }

/* Dropdowns */
.ctrl-select {
  padding: 5px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  cursor: pointer;
}
.ctrl-select:focus { border-color: var(--level-0); }

.stats {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  margin-left: auto;
}

/* ============================================================
   Main Layout: Two Panels
   ============================================================ */
.main {
  display: flex;
  height: calc(100vh - 52px);
}

/* Left panel: neuron list */
.list-panel {
  width: 320px;
  min-width: 260px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--bg-surface);
}

/* Right panel: detail + graph */
.detail-panel {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  background: var(--bg);
}

/* ============================================================
   Neuron List Items
   ============================================================ */
.level-group-header {
  padding: 8px 14px 4px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  position: sticky;
  top: 0;
  background: var(--bg-surface);
  z-index: 2;
  border-bottom: 1px solid var(--border);
}

.neuron-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  cursor: pointer;
  border-bottom: 1px solid rgba(48,54,61,0.4);
  transition: background 0.1s;
}
.neuron-item:hover { background: var(--bg-hover); }
.neuron-item.selected { background: rgba(240,136,62,0.12); border-left: 3px solid var(--node-selected); }

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.implemented { background: var(--implemented); }
.status-dot.planned { background: var(--planned); }

.neuron-item .name {
  font-size: 13px;
  font-weight: 500;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.neuron-item .cat {
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
}

/* ============================================================
   Detail Panel
   ============================================================ */
.detail-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  font-size: 14px;
  text-align: center;
  line-height: 1.6;
}

.detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.detail-header h2 {
  font-size: 22px;
  font-weight: 700;
}
.detail-badge {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}
.detail-badge.implemented { background: rgba(63,185,80,0.15); color: var(--implemented); }
.detail-badge.planned { background: rgba(210,153,34,0.15); color: var(--planned); }

.detail-meta {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
  font-size: 12px;
  color: var(--text-muted);
}
.detail-meta .label { color: var(--text-dim); }

.detail-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 20px;
  padding: 10px 14px;
  background: var(--bg-card);
  border-radius: 8px;
  border: 1px solid var(--border);
}

.dep-section {
  margin-bottom: 16px;
}
.dep-section h3 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dep-section h3 .arrow { font-size: 14px; }
.dep-section h3 .arrow.up { color: var(--edge-dep); }
.dep-section h3 .arrow.down { color: var(--edge-depby); }

.dep-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.dep-chip {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  transition: background 0.1s, border-color 0.1s;
}
.dep-chip:hover { background: var(--bg-hover); border-color: var(--text-muted); }
.dep-chip.implemented { border-left: 3px solid var(--implemented); }
.dep-chip.planned { border-left: 3px solid var(--planned); }

.dep-none {
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
}

/* ============================================================
   SVG Dependency Graph
   ============================================================ */
.graph-container {
  margin-top: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.graph-container h3 {
  font-size: 13px;
  font-weight: 600;
  padding: 10px 14px 0;
  color: var(--text-muted);
}
.graph-container svg {
  width: 100%;
  display: block;
}
.graph-container svg text {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 768px) {
  .main { flex-direction: column; }
  .list-panel { width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
  .detail-panel { height: 55vh; }
  .controls { gap: 8px; }
  .search-box { max-width: none; }
}
</style>
</head>
<body>

<!-- Controls Bar -->
<div class="controls">
  <div class="logo">NeuroScript <span>Neuron Genealogy</span></div>
  <input type="text" class="search-box" id="search" placeholder="Search neurons..." autocomplete="off">
  <div class="level-pills" id="levelPills">
    <div class="level-pill active" data-level="0">L0</div>
    <div class="level-pill active" data-level="1">L1</div>
    <div class="level-pill active" data-level="2">L2</div>
    <div class="level-pill active" data-level="3">L3</div>
    <div class="level-pill active" data-level="4">L4</div>
    <div class="level-pill active" data-level="5">L5</div>
  </div>
  <select class="ctrl-select" id="statusFilter">
    <option value="all">All status</option>
    <option value="implemented">Implemented</option>
    <option value="planned">Planned</option>
  </select>
  <select class="ctrl-select" id="categoryFilter">
    <option value="all">All categories</option>
  </select>
  <div class="stats" id="stats"></div>
</div>

<!-- Main two-panel layout -->
<div class="main">
  <div class="list-panel" id="listPanel"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty">Select a neuron from the list<br>to view its dependencies and details</div>
  </div>
</div>

<script>
// ============================================================
// NEURONS DATA ARRAY
//
// Schema:
//   name:         string   - Neuron name (unique identifier)
//   level:        0-5      - Hierarchy level (0=primitive, 5=external)
//   category:     string   - Domain category (see categories list)
//   status:       string   - "implemented" | "planned"
//   description:  string   - Short description of what this neuron does
//   dependencies: string[] - Names of neurons this one requires
//   implRef:      string?  - Optional implementation reference
//   source:       string?  - Optional source file path
//
// Categories:
//   core, activations, normalizations, regularization, convolutions,
//   pooling, embeddings, utility, attention, ffn, residual, gating,
//   transformer, cnn_arch, recurrent, vision, generative, graph_nn,
//   audio, models_lang, models_vision, models_multimodal, models_gen,
//   models_audio, models_specialized, meta_routing, meta_composition,
//   meta_recursive, meta_multiscale, meta_utilities, external,
//   adapters, exotic, rl, debug
// ============================================================

const NEURONS = [

  // ================================================================
  // LEVEL 0: PRIMITIVES (53 implemented + planned)
  // ================================================================

  // --- Core Operations ---
  { name: "Linear", level: 0, category: "core", status: "implemented",
    description: "Dense/fully-connected layer with shape tracking. The most fundamental neural network operation.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.linear.Linear", source: "stdlib/primitives/Linear.ns" },
  { name: "Bias", level: 0, category: "core", status: "implemented",
    description: "Additive bias parameter.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.operations.Bias" },
  { name: "Scale", level: 0, category: "core", status: "implemented",
    description: "Multiplicative scaling parameter.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.operations.Scale" },
  { name: "MatMul", level: 0, category: "core", status: "implemented",
    description: "Matrix multiplication operation.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.operations.MatMul" },
  { name: "Einsum", level: 0, category: "core", status: "implemented",
    description: "Einstein summation for generalized tensor operations.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.operations.Einsum" },

  // --- Activations ---
  { name: "ReLU", level: 0, category: "activations", status: "implemented",
    description: "Rectified Linear Unit activation. max(0, x).",
    dependencies: [], implRef: "neuroscript_runtime.primitives.activations.ReLU" },
  { name: "GELU", level: 0, category: "activations", status: "implemented",
    description: "Gaussian Error Linear Unit activation. Used in transformers (BERT, GPT).",
    dependencies: [], implRef: "neuroscript_runtime.primitives.activations.GELU" },
  { name: "SiLU", level: 0, category: "activations", status: "implemented",
    description: "Sigmoid Linear Unit (Swish) activation. x * sigmoid(x).",
    dependencies: [], implRef: "neuroscript_runtime.primitives.activations.SiLU" },
  { name: "Tanh", level: 0, category: "activations", status: "implemented",
    description: "Hyperbolic tangent activation.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.activations.Tanh" },
  { name: "Sigmoid", level: 0, category: "activations", status: "implemented",
    description: "Logistic sigmoid activation function.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.activations.Sigmoid" },
  { name: "Softmax", level: 0, category: "activations", status: "implemented",
    description: "Softmax activation. Normalizes to probability distribution.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.activations.Softmax" },
  { name: "Mish", level: 0, category: "activations", status: "implemented",
    description: "Mish: self-regularized non-monotonic activation.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.activations.Mish" },
  { name: "PReLU", level: 0, category: "activations", status: "implemented",
    description: "Parametric ReLU with learnable negative slope.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.activations.PReLU" },
  { name: "ELU", level: 0, category: "activations", status: "implemented",
    description: "Exponential Linear Unit activation.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.activations.ELU" },

  // --- Normalizations ---
  { name: "LayerNorm", level: 0, category: "normalizations", status: "implemented",
    description: "Layer normalization. Standard in transformers.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.normalization.LayerNorm" },
  { name: "BatchNorm", level: 0, category: "normalizations", status: "implemented",
    description: "Batch normalization. Standard in CNNs.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.normalization.BatchNorm" },
  { name: "RMSNorm", level: 0, category: "normalizations", status: "implemented",
    description: "Root Mean Square normalization. Efficient variant used in LLaMA.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.normalization.RMSNorm" },
  { name: "GroupNorm", level: 0, category: "normalizations", status: "implemented",
    description: "Group normalization. Works well with small batch sizes.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.normalization.GroupNorm" },
  { name: "InstanceNorm", level: 0, category: "normalizations", status: "implemented",
    description: "Instance normalization. Used in style transfer.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.normalization.InstanceNorm" },
  { name: "WeightNorm", level: 0, category: "normalizations", status: "planned",
    description: "Weight normalization. Reparameterizes weight vectors.",
    dependencies: [] },

  // --- Regularization ---
  { name: "Dropout", level: 0, category: "regularization", status: "implemented",
    description: "Random neuron dropout regularization with training/eval modes.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.regularization.Dropout" },
  { name: "DropPath", level: 0, category: "regularization", status: "implemented",
    description: "Stochastic depth / drop path regularization.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.regularization.DropPath" },
  { name: "DropConnect", level: 0, category: "regularization", status: "implemented",
    description: "Connection dropout (drops weights instead of activations).",
    dependencies: [], implRef: "neuroscript_runtime.primitives.regularization.DropConnect" },
  { name: "Dropblock", level: 0, category: "regularization", status: "planned",
    description: "Structured dropout for CNNs. Drops contiguous regions.",
    dependencies: [] },
  { name: "SpecAugment", level: 0, category: "regularization", status: "planned",
    description: "Frequency/time masking for audio data augmentation.",
    dependencies: [] },

  // --- Convolutions ---
  { name: "Conv1d", level: 0, category: "convolutions", status: "implemented",
    description: "1D convolution for sequence data.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.convolutions.Conv1d" },
  { name: "Conv2d", level: 0, category: "convolutions", status: "implemented",
    description: "2D convolution for image data.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.convolutions.Conv2d" },
  { name: "Conv3d", level: 0, category: "convolutions", status: "implemented",
    description: "3D convolution for video/volumetric data.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.convolutions.Conv3d" },
  { name: "DepthwiseConv", level: 0, category: "convolutions", status: "implemented",
    description: "Depthwise (channel-wise) convolution.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.convolutions.DepthwiseConv" },
  { name: "SeparableConv", level: 0, category: "convolutions", status: "implemented",
    description: "Separable convolution: depthwise + pointwise.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.convolutions.SeparableConv" },
  { name: "TransposedConv", level: 0, category: "convolutions", status: "implemented",
    description: "Transposed (deconvolution) for upsampling.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.convolutions.TransposedConv" },
  { name: "DilatedConv", level: 0, category: "convolutions", status: "planned",
    description: "Atrous/dilated convolution for expanded receptive field.",
    dependencies: [] },

  // --- Pooling ---
  { name: "MaxPool", level: 0, category: "pooling", status: "implemented",
    description: "Max pooling layer.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.pooling.MaxPool" },
  { name: "AvgPool", level: 0, category: "pooling", status: "implemented",
    description: "Average pooling layer.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.pooling.AvgPool" },
  { name: "AdaptiveAvgPool", level: 0, category: "pooling", status: "implemented",
    description: "Adaptive average pooling with fixed output size.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.pooling.AdaptiveAvgPool" },
  { name: "AdaptiveMaxPool", level: 0, category: "pooling", status: "implemented",
    description: "Adaptive max pooling with fixed output size.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.pooling.AdaptiveMaxPool" },
  { name: "GlobalAvgPool", level: 0, category: "pooling", status: "implemented",
    description: "Global average pooling. Reduces spatial dims to 1x1.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.pooling.GlobalAvgPool" },
  { name: "GlobalMaxPool", level: 0, category: "pooling", status: "implemented",
    description: "Global max pooling. Reduces spatial dims to 1x1.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.pooling.GlobalMaxPool" },

  // --- Embeddings ---
  { name: "Embedding", level: 0, category: "embeddings", status: "implemented",
    description: "Token embedding: discrete tokens to dense vectors.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.embeddings.Embedding" },
  { name: "PositionalEncoding", level: 0, category: "embeddings", status: "implemented",
    description: "Sinusoidal positional encoding (Attention Is All You Need).",
    dependencies: [], implRef: "neuroscript_runtime.primitives.embeddings.PositionalEncoding" },
  { name: "LearnedPositionalEmbedding", level: 0, category: "embeddings", status: "implemented",
    description: "Learned positional embeddings (BERT/GPT style).",
    dependencies: [], implRef: "neuroscript_runtime.primitives.embeddings.LearnedPositionalEmbedding" },
  { name: "RotaryEmbedding", level: 0, category: "embeddings", status: "implemented",
    description: "Rotary Position Embedding (RoPE). Used in LLaMA, PaLM.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.embeddings.RotaryEmbedding" },
  { name: "ALiBi", level: 0, category: "embeddings", status: "planned",
    description: "Attention with Linear Biases. Length-extrapolatable positional encoding.",
    dependencies: [] },

  // --- Structural/Utility ---
  { name: "Identity", level: 0, category: "utility", status: "implemented",
    description: "Identity pass-through operation. Useful for routing and skip connections.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.structural.Identity" },
  { name: "Fork", level: 0, category: "utility", status: "implemented",
    description: "Split tensor into two references for multi-path processing.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.structural.Fork" },
  { name: "Fork3", level: 0, category: "utility", status: "implemented",
    description: "Split tensor into three references for multi-path processing.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.structural.Fork3" },
  { name: "Add", level: 0, category: "utility", status: "implemented",
    description: "Element-wise addition. Core of residual connections.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.structural.Add" },
  { name: "Multiply", level: 0, category: "utility", status: "implemented",
    description: "Element-wise multiplication. Core of gating mechanisms.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.structural.Multiply" },
  { name: "Concat", level: 0, category: "utility", status: "implemented",
    description: "Concatenate tensors along a dimension.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.structural.Concat" },
  { name: "Reshape", level: 0, category: "utility", status: "implemented",
    description: "Reshape tensor to new shape (preserves element count).",
    dependencies: [], implRef: "neuroscript_runtime.primitives.structural.Reshape" },
  { name: "Transpose", level: 0, category: "utility", status: "implemented",
    description: "Permute tensor dimensions.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.structural.Transpose" },
  { name: "Flatten", level: 0, category: "utility", status: "implemented",
    description: "Flatten a contiguous range of dimensions.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.structural.Flatten" },
  { name: "Split", level: 0, category: "utility", status: "implemented",
    description: "Split tensor into chunks along a dimension.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.structural.Split" },
  { name: "Slice", level: 0, category: "utility", status: "implemented",
    description: "Slice tensor along a dimension.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.structural.Slice" },
  { name: "Pad", level: 0, category: "utility", status: "implemented",
    description: "Pad tensor with a value along dimensions.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.structural.Pad" },
  { name: "Crop", level: 0, category: "utility", status: "planned",
    description: "Crop/trim tensor along dimensions.",
    dependencies: [] },
  { name: "Cast", level: 0, category: "utility", status: "planned",
    description: "Dtype conversion (float32, float16, bfloat16, etc.).",
    dependencies: [] },
  { name: "Clone", level: 0, category: "utility", status: "planned",
    description: "Tensor duplication.",
    dependencies: [] },

  // --- Attention primitives ---
  { name: "ScaledDotProductAttention", level: 0, category: "attention", status: "implemented",
    description: "Scaled dot-product attention. The core transformer building block.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.attention.ScaledDotProductAttention" },
  { name: "MultiHeadSelfAttention", level: 0, category: "attention", status: "implemented",
    description: "Multi-head self-attention mechanism. Complete attention with head splitting.",
    dependencies: [], implRef: "neuroscript_runtime.primitives.attention.MultiHeadSelfAttention" },

  // --- Debug ---

// ============================================================
// APPLICATION STATE & INDEXES
// ============================================================

let selectedNeuron = null;
let activeLevels = new Set([0, 1, 2, 3, 4, 5]);
let searchQuery = '';
let statusFilter = 'all';
let categoryFilter = 'all';

// Build indexes
const neuronMap = new Map();       // name -> neuron
const requiredByMap = new Map();   // name -> [names that depend on it]
const categories = new Set();

function buildIndexes() {
  NEURONS.forEach(n => {
    neuronMap.set(n.name, n);
    categories.add(n.category);
    if (!requiredByMap.has(n.name)) requiredByMap.set(n.name, []);
  });
  NEURONS.forEach(n => {
    (n.dependencies || []).forEach(dep => {
      if (!requiredByMap.has(dep)) requiredByMap.set(dep, []);
      requiredByMap.get(dep).push(n.name);
    });
  });
}

buildIndexes();

// Populate category dropdown
function populateCategoryDropdown() {
  const sel = document.getElementById('categoryFilter');
  const sorted = [...categories].sort();
  sorted.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat.replace(/_/g, ' ');
    sel.appendChild(opt);
  });
}
populateCategoryDropdown();


// ============================================================
// FILTERING
// ============================================================

function getFilteredNeurons() {
  return NEURONS.filter(n => {
    if (!activeLevels.has(n.level)) return false;
    if (statusFilter !== 'all' && n.status !== statusFilter) return false;
    if (categoryFilter !== 'all' && n.category !== categoryFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return n.name.toLowerCase().includes(q) || n.description.toLowerCase().includes(q);
    }
    return true;
  });
}


// ============================================================
// RENDER NEURON LIST
// ============================================================

const LEVEL_NAMES = ['L0: Primitives', 'L1: Composites', 'L2: Architectural', 'L3: Models', 'L4: Meta', 'L5: External'];

function renderList() {
  const panel = document.getElementById('listPanel');
  const filtered = getFilteredNeurons();

  // Group by level
  const groups = new Map();
  filtered.forEach(n => {
    if (!groups.has(n.level)) groups.set(n.level, []);
    groups.get(n.level).push(n);
  });

  let html = '';
  for (let lvl = 0; lvl <= 5; lvl++) {
    const items = groups.get(lvl);
    if (!items || items.length === 0) continue;
    items.sort((a, b) => a.name.localeCompare(b.name));

    html += `<div class="level-group-header" style="color:var(--level-${lvl})">${LEVEL_NAMES[lvl]} (${items.length})</div>`;
    items.forEach(n => {
      const sel = selectedNeuron && selectedNeuron.name === n.name ? ' selected' : '';
      html += `<div class="neuron-item${sel}" data-name="${n.name}">
        <span class="status-dot ${n.status}"></span>
        <span class="name">${n.name}</span>
        <span class="cat">${n.category}</span>
      </div>`;
    });
  }

  panel.innerHTML = html;

  // Update stats
  const totalShown = filtered.length;
  const implCount = filtered.filter(n => n.status === 'implemented').length;
  document.getElementById('stats').textContent = `${totalShown} of ${NEURONS.length} neurons, ${implCount} implemented`;

  // Add click handlers
  panel.querySelectorAll('.neuron-item').forEach(el => {
    el.addEventListener('click', () => {
      const n = neuronMap.get(el.dataset.name);
      if (n) selectNeuron(n);
    });
  });
}


// ============================================================
// RENDER DETAIL PANEL
// ============================================================

function selectNeuron(n) {
  selectedNeuron = n;
  window.location.hash = n.name;
  renderList();
  renderDetail(n);
}

function renderDetail(n) {
  const panel = document.getElementById('detailPanel');
  const deps = n.dependencies || [];
  const depBy = requiredByMap.get(n.name) || [];

  let html = '';

  // Header
  html += `<div class="detail-header">
    <h2 style="color:var(--level-${n.level})">${n.name}</h2>
    <span class="detail-badge ${n.status}">${n.status}</span>
  </div>`;

  // Meta
  html += `<div class="detail-meta">
    <span><span class="label">Level:</span> ${n.level} (${LEVEL_NAMES[n.level].split(': ')[1]})</span>
    <span><span class="label">Category:</span> ${n.category.replace(/_/g, ' ')}</span>
    ${n.implRef ? `<span><span class="label">Impl:</span> ${n.implRef}</span>` : ''}
    ${n.source ? `<span><span class="label">Source:</span> ${n.source}</span>` : ''}
  </div>`;

  // Description
  html += `<div class="detail-desc">${n.description}</div>`;

  // Requires (upstream deps)
  html += `<div class="dep-section">
    <h3><span class="arrow up">&uarr;</span> Requires (${deps.length})</h3>`;
  if (deps.length > 0) {
    html += `<div class="dep-list">`;
    deps.forEach(d => {
      const dn = neuronMap.get(d);
      const st = dn ? dn.status : 'planned';
      html += `<span class="dep-chip ${st}" data-name="${d}">${d}</span>`;
    });
    html += `</div>`;
  } else {
    html += `<span class="dep-none">No dependencies (primitive or self-contained)</span>`;
  }
  html += `</div>`;

  // Required By (downstream dependents)
  html += `<div class="dep-section">
    <h3><span class="arrow down">&darr;</span> Required By (${depBy.length})</h3>`;
  if (depBy.length > 0) {
    html += `<div class="dep-list">`;
    [...depBy].sort().forEach(d => {
      const dn = neuronMap.get(d);
      const st = dn ? dn.status : 'planned';
      html += `<span class="dep-chip ${st}" data-name="${d}">${d}</span>`;
    });
    html += `</div>`;
  } else {
    html += `<span class="dep-none">No neurons depend on this yet</span>`;
  }
  html += `</div>`;

  // SVG Graph
  html += `<div class="graph-container">
    <h3>Dependency Graph</h3>
    <div id="graphSvg"></div>
  </div>`;

  panel.innerHTML = html;

  // Click handlers on chips
  panel.querySelectorAll('.dep-chip').forEach(el => {
    el.addEventListener('click', () => {
      const target = neuronMap.get(el.dataset.name);
      if (target) selectNeuron(target);
    });
  });

  // Render SVG
  renderGraph(n, deps, depBy);
}


// ============================================================
// SVG DEPENDENCY GRAPH (3-column layout)
// ============================================================

function renderGraph(n, deps, depBy) {
  const container = document.getElementById('graphSvg');

  const nodeW = 140, nodeH = 30, padX = 30, padY = 14;
  const colGap = 100;

  const leftNodes = deps.map(d => neuronMap.get(d) || { name: d, status: 'planned', level: 0 });
  const rightNodes = depBy.map(d => neuronMap.get(d) || { name: d, status: 'planned', level: 0 });

  const maxSide = Math.max(leftNodes.length, rightNodes.length, 1);
  const totalH = Math.max(maxSide * (nodeH + padY) + padY + 40, nodeH + padY * 2 + 40);
  const totalW = nodeW * 3 + colGap * 2 + padX * 2;

  // Column x-positions
  const colL = padX;
  const colC = padX + nodeW + colGap;
  const colR = padX + (nodeW + colGap) * 2;

  // Y center for each column
  function yPos(idx, count) {
    const blockH = count * (nodeH + padY) - padY;
    const startY = (totalH - blockH) / 2;
    return startY + idx * (nodeH + padY);
  }
  const centerY = (totalH - nodeH) / 2;

  // Level color
  function lvlColor(nn) { return `var(--level-${nn.level || 0})`; }
  function statusColor(nn) { return nn.status === 'implemented' ? 'var(--implemented)' : 'var(--planned)'; }

  let svg = `<svg viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg" style="min-height:${Math.min(totalH, 500)}px">`;

  // Draw edges first (behind nodes)
  // Left -> Center
  leftNodes.forEach((ln, i) => {
    const x1 = colL + nodeW;
    const y1 = yPos(i, leftNodes.length) + nodeH / 2;
    const x2 = colC;
    const y2 = centerY + nodeH / 2;
    const cpx = (x1 + x2) / 2;
    svg += `<path d="M${x1},${y1} C${cpx},${y1} ${cpx},${y2} ${x2},${y2}" fill="none" stroke="var(--edge-dep)" stroke-width="1.5" opacity="0.5"/>`;
  });

  // Center -> Right
  rightNodes.forEach((rn, i) => {
    const x1 = colC + nodeW;
    const y1 = centerY + nodeH / 2;
    const x2 = colR;
    const y2 = yPos(i, rightNodes.length) + nodeH / 2;
    const cpx = (x1 + x2) / 2;
    svg += `<path d="M${x1},${y1} C${cpx},${y1} ${cpx},${y2} ${x2},${y2}" fill="none" stroke="var(--edge-depby)" stroke-width="1.5" opacity="0.5"/>`;
  });

  // Draw nodes
  function drawNode(x, y, nn, isCenter) {
    const fill = isCenter ? 'var(--bg-hover)' : 'var(--bg-card)';
    const border = isCenter ? 'var(--node-selected)' : 'var(--border)';
    const sw = isCenter ? 2 : 1;
    const r = 6;
    const dotColor = statusColor(nn);
    const textColor = isCenter ? 'var(--text)' : lvlColor(nn);
    const truncName = nn.name.length > 16 ? nn.name.slice(0, 15) + '\u2026' : nn.name;

    svg += `<g class="graph-node" data-name="${nn.name}" style="cursor:pointer">`;
    svg += `<rect x="${x}" y="${y}" width="${nodeW}" height="${nodeH}" rx="${r}" fill="${fill}" stroke="${border}" stroke-width="${sw}"/>`;
    svg += `<circle cx="${x + 10}" cy="${y + nodeH/2}" r="4" fill="${dotColor}"/>`;
    svg += `<text x="${x + 20}" y="${y + nodeH/2 + 4}" fill="${textColor}" font-size="11" font-weight="${isCenter ? 700 : 500}">${truncName}</text>`;
    svg += `</g>`;
  }

  // Left nodes (deps)
  leftNodes.forEach((ln, i) => drawNode(colL, yPos(i, leftNodes.length), ln, false));

  // Center node (selected)
  drawNode(colC, centerY, n, true);

  // Right nodes (depBy)
  rightNodes.forEach((rn, i) => drawNode(colR, yPos(i, rightNodes.length), rn, false));

  // Labels
  if (leftNodes.length > 0) {
    svg += `<text x="${colL + nodeW/2}" y="16" fill="var(--text-dim)" font-size="10" text-anchor="middle" font-weight="600">REQUIRES</text>`;
  }
  if (rightNodes.length > 0) {
    svg += `<text x="${colR + nodeW/2}" y="16" fill="var(--text-dim)" font-size="10" text-anchor="middle" font-weight="600">REQUIRED BY</text>`;
  }

  svg += `</svg>`;
  container.innerHTML = svg;

  // Make graph nodes clickable
  container.querySelectorAll('.graph-node').forEach(el => {
    el.addEventListener('click', () => {
      const target = neuronMap.get(el.dataset.name);
      if (target) selectNeuron(target);
    });
  });
}


// ============================================================
// EVENT HANDLERS
// ============================================================

// Search (debounced)
let searchTimer = null;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    renderList();
  }, 150);
});

// Level pills
document.querySelectorAll('.level-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    const lvl = parseInt(pill.dataset.level);
    if (activeLevels.has(lvl)) {
      activeLevels.delete(lvl);
      pill.classList.remove('active');
    } else {
      activeLevels.add(lvl);
      pill.classList.add('active');
    }
    renderList();
  });
});

// Status filter
document.getElementById('statusFilter').addEventListener('change', e => {
  statusFilter = e.target.value;
  renderList();
});

// Category filter
document.getElementById('categoryFilter').addEventListener('change', e => {
  categoryFilter = e.target.value;
  renderList();
});

// URL hash navigation
function handleHash() {
  const hash = window.location.hash.slice(1);
  if (hash) {
    const decoded = decodeURIComponent(hash);
    const n = neuronMap.get(decoded);
    if (n) {
      selectedNeuron = n;
      renderList();
      renderDetail(n);
      // Scroll list to selected
      setTimeout(() => {
        const el = document.querySelector(`.neuron-item[data-name="${n.name}"]`);
        if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }, 50);
      return;
    }
  }
}
window.addEventListener('hashchange', handleHash);


// ============================================================
// INITIAL RENDER
// ============================================================

renderList();
handleHash();

</script>
</body>
</html>
